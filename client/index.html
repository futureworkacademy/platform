        <h1>Future Work Academy</h1>
        <p>An immersive AI-powered business simulation for management education. Students lead Apex Manufacturing through 8 weeks of strategic decisions about AI adoption, workforce transformation, and cultural health.</p>
        <h2>For Educators</h2>
        <p>AI-powered essay grading with instructor override, 3 difficulty tiers, FERPA-aligned privacy mode, LMS integration via bulk CSV upload, and student feedback surveys. <a href="/for-educators">Learn more</a></p>
        <h2>For Students</h2>
        <p>Make strategic decisions, manage 17 stakeholders, consult 9 expert advisors, and receive AI-graded feedback with transparent rubrics. Attach charts and visualizations to strengthen your essay scores. <a href="/for-students">Learn more</a></p>
        <h2>Grading Methodology</h2>
        <p>Essays are evaluated on 4 criteria (25 points each): Evidence Quality, Reasoning Coherence, Trade-off Analysis, and Stakeholder Consideration. <a href="/methodology">Full methodology</a></p>
